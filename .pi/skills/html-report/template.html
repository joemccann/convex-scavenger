<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* 
     * TERMINAL DASHBOARD THEME
     * Monochromatic, high-density, dual-mode (dark/light)
     * 
     * Theme priority:
     * 1. Manual override via data-theme attribute
     * 2. System preference via prefers-color-scheme
     * 3. Default: dark mode
     */
    
    /* Default tokens (dark mode) */
    :root {
      --bg-base: #0a0f14;
      --bg-panel: #0f1519;
      --bg-hover: #151c22;
      --border-dim: #1e293b;
      --border-focus: #05AD98;
      --text-primary: #e2e8f0;
      --text-muted: #94a3b8;
      --accent-bg: #05AD98;
      --accent-text: #0a0f14;
      --positive: #05AD98;
      --negative: #E85D6C;
      --warning: #F5A623;
    }
    
    /* System preference: light mode */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg-base: #FFFFFF;
        --bg-panel: #FFFFFF;
        --bg-hover: #f1f5f9;
        --border-dim: #BBBFBF;
        --border-focus: #05AD98;
        --text-primary: #000000;
        --text-muted: #878787;
        --accent-bg: #05AD98;
        --accent-text: #FFFFFF;
        --positive: #048A7A;
        --negative: #D4183D;
        --warning: #D4910A;
      }
    }

    /* Manual override: light mode */
    [data-theme="light"] {
      --bg-base: #FFFFFF;
      --bg-panel: #FFFFFF;
      --bg-hover: #f1f5f9;
      --border-dim: #BBBFBF;
      --border-focus: #05AD98;
      --text-primary: #000000;
      --text-muted: #878787;
      --accent-bg: #05AD98;
      --accent-text: #FFFFFF;
      --positive: #048A7A;
      --negative: #D4183D;
      --warning: #D4910A;
    }
    
    /* Manual override: dark mode */
    [data-theme="dark"] {
      --bg-base: #0a0f14;
      --bg-panel: #0f1519;
      --bg-hover: #151c22;
      --border-dim: #1e293b;
      --border-focus: #05AD98;
      --text-primary: #e2e8f0;
      --text-muted: #94a3b8;
      --accent-bg: #05AD98;
      --accent-text: #0a0f14;
      --positive: #05AD98;
      --negative: #E85D6C;
      --warning: #F5A623;
    }

    /* ========== BASE STYLES ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      background: var(--bg-base);
      color: var(--text-primary);
    }

    /* ========== LAYOUT ========== */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      border-bottom: 1px solid var(--border-dim);
      padding-bottom: 16px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .title {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .timestamp {
      font-size: 11px;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }

    /* ========== PANELS ========== */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      margin-bottom: 16px;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-dim);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-body {
      padding: 16px;
    }

    .panel-accent {
      border: 2px solid var(--accent-bg);
    }

    /* ========== METRICS GRID ========== */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1px;
      background: var(--border-dim);
      border: 1px solid var(--border-dim);
      margin-bottom: 24px;
    }

    .metric {
      background: var(--bg-panel);
      padding: 16px;
    }

    .metric-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .metric-value.large { font-size: 32px; }
    .metric-value.small { font-size: 18px; }

    .metric-change {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-dim);
    }

    /* ========== TABLES ========== */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-dim);
      position: sticky;
      top: 0;
      background: var(--bg-panel);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-dim);
    }

    tr:hover {
      background: var(--bg-hover);
    }

    tr.highlight {
      background: var(--bg-hover);
    }

    /* ========== TEXT UTILITIES ========== */
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .text-muted { color: var(--text-muted); }
    .text-positive { color: var(--positive); }
    .text-negative { color: var(--negative); }
    .text-warning { color: var(--warning); }
    .text-mono { font-family: 'JetBrains Mono', monospace; }
    .text-small { font-size: 11px; }
    .text-uppercase { text-transform: uppercase; letter-spacing: 0.1em; }

    /* ========== PILLS / BADGES ========== */
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid var(--border-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .pill-accent {
      background: var(--accent-bg);
      color: var(--accent-text);
      border-color: var(--accent-bg);
    }

    .pill-positive {
      background: var(--positive);
      color: #000;
      border-color: var(--positive);
    }

    .pill-negative {
      background: var(--negative);
      color: #FFF;
      border-color: var(--negative);
    }

    .pill-warning {
      background: var(--warning);
      color: #000;
      border-color: var(--warning);
    }

    /* ========== STATUS INDICATORS ========== */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--accent-bg);
      animation: pulse 2s infinite;
    }

    .status-dot.positive { background: var(--positive); }
    .status-dot.negative { background: var(--negative); }
    .status-dot.warning { background: var(--warning); }
    .status-dot.static { animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ========== BUTTONS ========== */
    .btn {
      background: transparent;
      border: 1px solid var(--border-dim);
      color: var(--text-primary);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: all 150ms ease-in-out;
    }

    .btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-focus);
    }

    .btn-accent {
      background: var(--accent-bg);
      color: var(--accent-text);
      border-color: var(--accent-bg);
    }

    .btn-accent:hover {
      opacity: 0.9;
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border-dim);
      color: var(--text-primary);
      padding: 4px 12px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: all 150ms ease-in-out;
    }

    .theme-toggle:hover {
      background: var(--bg-hover);
      border-color: var(--border-focus);
    }

    /* ========== SPECIAL COMPONENTS ========== */
    .divider {
      border: none;
      border-top: 1px solid var(--border-dim);
      margin: 32px 0;
    }

    .section-header {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-dim);
    }

    .callout {
      background: var(--bg-hover);
      border-left: 3px solid var(--accent-bg);
      padding: 16px;
      margin: 16px 0;
    }

    .callout-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .callout.positive { border-left-color: var(--positive); }
    .callout.negative { border-left-color: var(--negative); }
    .callout.warning { border-left-color: var(--warning); }

    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      padding: 20px;
    }

    .card-accent {
      border: 2px solid var(--accent-bg);
    }

    .footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border-dim);
      color: var(--text-muted);
      font-size: 11px;
    }

    /* ========== PROGRESS BARS ========== */
    .bar-container {
      width: 100px;
      height: 8px;
      background: var(--border-dim);
      display: inline-block;
      vertical-align: middle;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent-bg);
    }

    .bar-fill.positive { background: var(--positive); }
    .bar-fill.negative { background: var(--negative); }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-focus); }

    /* ========== PRINT STYLES ========== */
    @media print {
      body { background: white; color: black; }
      .theme-toggle, .btn { display: none; }
      .panel { border-color: #ccc; }
      .header { border-bottom-color: #ccc; }
    }
  </style>
</head>
<body>
  <div class="container">
    {{BODY}}
  </div>

  <script>
    // Theme toggle - respects system preference, allows manual override
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      
      if (currentTheme) {
        html.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        html.setAttribute('data-theme', prefersDark ? 'light' : 'dark');
      }
      updateToggleIcon();
    }
    
    // Update toggle button icon based on current effective theme
    function updateToggleIcon() {
      const btn = document.querySelector('.theme-toggle');
      if (!btn) return;
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
        (!document.documentElement.getAttribute('data-theme') && 
         window.matchMedia('(prefers-color-scheme: dark)').matches);
      btn.textContent = isDark ? '☀ LIGHT' : '◐ DARK';
    }
    
    // Initialize on load
    document.addEventListener('DOMContentLoaded', updateToggleIcon);
  </script>
</body>
</html>
